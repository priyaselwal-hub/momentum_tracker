name: daily-paper-trade

# Runs every weekday after NSE close (15:30 IST = 10:00 UTC). GitHub may delay
# scheduled jobs at busy times, so we aim a bit later. You can also run it any
# time by hand from the Actions tab (the "Run workflow" button).
on:
  schedule:
    - cron: "30 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write          # lets the job commit the updated log + dashboard back

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update paper trade (uses yesterday's close)
        run: python paper_trade.py --starter

      - name: Build the dashboard page
        run: python build_site.py

      - name: Save results back to the repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "daily update $(date -u +%Y-%m-%d)" || echo "nothing changed today"
          git push
